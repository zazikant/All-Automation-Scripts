<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Brochure Feedback</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f4f6f9; color: #1a1a2e; min-height: 100vh; padding: 24px 16px; }
  h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 4px; }
  .subtitle { font-size: 0.85rem; color: #666; margin-bottom: 24px; }

  .card { background: #fff; border-radius: 12px; padding: 20px 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: #444; letter-spacing: 0.3px; }

  .meta-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  label { display: block; font-size: 0.78rem; font-weight: 600; color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.4px; }
  input[type="text"], input[type="date"] {
    width: 100%; padding: 8px 10px; border: 1.5px solid #e0e0e0; border-radius: 8px;
    font-size: 0.9rem; outline: none; transition: border-color 0.2s;
  }
  input:focus { border-color: #4f46e5; }

  .page-block { background: #fff; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow: hidden; }
  .page-header { display: flex; align-items: center; gap: 10px; background: #4f46e5; padding: 14px 20px; }
  .page-number { background: rgba(255,255,255,0.25); color: #fff; font-weight: 700; font-size: 0.8rem; padding: 2px 10px; border-radius: 20px; }
  .page-name-input {
    flex: 1; background: transparent; border: none; border-bottom: 1.5px solid rgba(255,255,255,0.5);
    color: #fff; font-size: 1rem; font-weight: 600; outline: none; padding: 2px 4px;
  }
  .page-name-input::placeholder { color: rgba(255,255,255,0.6); }
  .btn-remove-page { background: rgba(255,255,255,0.15); border: none; color: #fff; cursor: pointer; border-radius: 6px; padding: 4px 10px; font-size: 0.8rem; }
  .btn-remove-page:hover { background: rgba(255,255,255,0.3); }

  .page-body { padding: 16px 20px 20px; }

  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; margin-bottom: 12px; }
  thead th { text-align: left; padding: 8px 10px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: #888; border-bottom: 2px solid #f0f0f0; }
  tbody tr { border-bottom: 1px solid #f5f5f5; }
  tbody tr:last-child { border-bottom: none; }
  tbody td { padding: 6px 4px; }
  .cell-input {
    width: 100%; border: 1.5px solid transparent; border-radius: 6px; padding: 6px 8px;
    font-size: 0.87rem; font-family: inherit; background: #f8f8fb; outline: none; transition: border-color 0.2s;
    resize: none; min-height: 36px;
  }
  .cell-input:focus { border-color: #4f46e5; background: #fff; }
  .td-remove { width: 36px; text-align: center; }
  .btn-remove-row { background: none; border: none; color: #ccc; cursor: pointer; font-size: 1rem; padding: 4px; border-radius: 4px; }
  .btn-remove-row:hover { color: #ef4444; }

  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: none; transition: background 0.2s, transform 0.1s; }
  .btn:active { transform: scale(0.97); }
  .btn-outline { background: #f0f0f5; color: #4f46e5; }
  .btn-outline:hover { background: #e5e3ff; }
  .btn-primary { background: #4f46e5; color: #fff; }
  .btn-primary:hover { background: #4338ca; }
  .btn-success { background: #16a34a; color: #fff; }
  .btn-success:hover { background: #15803d; }
  .btn-danger { background: #ef4444; color: #fff; }
  .btn-danger:hover { background: #dc2626; }

  .actions-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
  .add-row-bar { margin-top: 4px; }

  .toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }

  .preview-box {
    background: #1e1e2e; color: #a6e3a1; border-radius: 12px; padding: 20px 24px;
    font-family: 'Courier New', monospace; font-size: 0.82rem; white-space: pre-wrap;
    max-height: 400px; overflow-y: auto; display: none; margin-top: 20px;
  }
  .preview-box.visible { display: block; }

  .empty-state { text-align: center; color: #bbb; padding: 40px 20px; font-size: 0.9rem; }

  @media (max-width: 640px) {
    .meta-grid { grid-template-columns: 1fr; }
    table, thead, tbody, th, td, tr { display: block; }
    thead { display: none; }
    tbody td { padding: 4px 0; }
    .cell-input { min-height: 32px; }
  }
</style>
</head>
<body>

<h1>📋 Brochure Feedback</h1>
<p class="subtitle">Fill in the details below, add pages and changes, then download as Markdown.</p>

<div class="card">
  <h2>Meeting Details</h2>
  <div class="meta-grid">
    <div>
      <label>Meeting Date</label>
      <input type="date" id="meeting-date" />
    </div>
    <div>
      <label>Reviewed By</label>
      <input type="text" id="reviewed-by" placeholder="e.g. Design Review Team" />
    </div>
    <div>
      <label>Brochure Version</label>
      <input type="text" id="brochure-version" placeholder="e.g. v1" />
    </div>
  </div>
</div>

<div class="toolbar">
  <button class="btn btn-primary" onclick="addPage()">+ Add Page</button>
  <button class="btn btn-outline" onclick="togglePreview()">👁 Preview Markdown</button>
  <button class="btn btn-success" onclick="downloadMarkdown()">⬇ Download .md</button>
  <button class="btn btn-outline" onclick="downloadJSON()">⬇ Download .json</button>
</div>

<div id="pages-container">
  <div class="empty-state" id="empty-msg">No pages yet. Click "+ Add Page" to start.</div>
</div>

<div class="preview-box" id="preview-box"></div>

<script>
  let pageCount = 0;

  // Set today's date by default
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('meeting-date').value = today;

  function addPage() {
    pageCount++;
    document.getElementById('empty-msg').style.display = 'none';

    const div = document.createElement('div');
    div.className = 'page-block';
    div.id = `page-${pageCount}`;
    div.innerHTML = `
      <div class="page-header">
        <span class="page-number">Page ${pageCount}</span>
        <input class="page-name-input" placeholder="Page name (e.g. Cover Page)" />
        <button class="btn-remove-page" onclick="removePage('page-${pageCount}')">✕ Remove</button>
      </div>
      <div class="page-body">
        <table>
          <thead>
            <tr>
              <th>Element</th>
              <th>Current</th>
              <th>Change To</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="rows-${pageCount}">
          </tbody>
        </table>
        <div class="add-row-bar">
          <button class="btn btn-outline" onclick="addRow(${pageCount})">+ Add Row</button>
        </div>
      </div>
    `;
    document.getElementById('pages-container').appendChild(div);
    addRow(pageCount);
  }

  function addRow(pageId) {
    const tbody = document.getElementById(`rows-${pageId}`);
    const rowId = Date.now();
    const tr = document.createElement('tr');
    tr.id = `row-${rowId}`;
    tr.innerHTML = `
      <td><textarea class="cell-input" placeholder="e.g. Main Headline" rows="1" oninput="autoResize(this)"></textarea></td>
      <td><textarea class="cell-input" placeholder="e.g. Welcome to Our Company" rows="1" oninput="autoResize(this)"></textarea></td>
      <td><textarea class="cell-input" placeholder="e.g. Transforming Businesses..." rows="1" oninput="autoResize(this)"></textarea></td>
      <td class="td-remove"><button class="btn-remove-row" onclick="removeRow('row-${rowId}')">✕</button></td>
    `;
    tbody.appendChild(tr);
  }

  function removeRow(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  function removePage(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
    if (document.querySelectorAll('.page-block').length === 0) {
      document.getElementById('empty-msg').style.display = '';
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
  }

  function collectData() {
    const date = document.getElementById('meeting-date').value;
    const reviewedBy = document.getElementById('reviewed-by').value.trim() || 'Not specified';
    const version = document.getElementById('brochure-version').value.trim() || 'v1';

    const pages = [];
    document.querySelectorAll('.page-block').forEach((block, i) => {
      const pageName = block.querySelector('.page-name-input').value.trim() || `Page ${i + 1}`;
      const changes = [];
      block.querySelectorAll('tbody tr').forEach(row => {
        const cells = row.querySelectorAll('textarea');
        if (cells.length >= 3) {
          const element = cells[0].value.trim();
          const current = cells[1].value.trim();
          const changeTo = cells[2].value.trim();
          if (element || current || changeTo) {
            changes.push({ element, current, change_to: changeTo });
          }
        }
      });
      pages.push({ page: i + 1, name: pageName, changes });
    });

    return { date, reviewedBy, version, pages };
  }

  function generateMarkdown() {
    const { date, reviewedBy, version, pages } = collectData();

    let md = `# Brochure Feedback\n`;
    md += `**Meeting Date:** ${date}\n`;
    md += `**Reviewed By:** ${reviewedBy}\n`;
    md += `**Brochure Version:** ${version}\n\n`;
    md += `---\n\n`;

    pages.forEach(p => {
      md += `## Page ${p.page} — ${p.name}\n\n`;
      md += `| Element | Current | Change To |\n`;
      md += `|---|---|---|\n`;
      if (p.changes.length === 0) {
        md += `| — | — | — |\n`;
      } else {
        p.changes.forEach(c => {
          const el = c.element || '—';
          const cur = c.current || '—';
          const chg = c.change_to || '—';
          md += `| ${el} | ${cur} | ${chg} |\n`;
        });
      }
      md += `\n---\n\n`;
    });

    return md;
  }

  function generateJSON() {
    const { date, reviewedBy, version, pages } = collectData();
    return JSON.stringify({
      brochure_feedback: {
        meeting_date: date,
        reviewed_by: reviewedBy,
        brochure_version: version,
        pages
      }
    }, null, 2);
  }

  function togglePreview() {
    const box = document.getElementById('preview-box');
    box.textContent = generateMarkdown();
    box.classList.toggle('visible');
  }

  function downloadMarkdown() {
    const md = generateMarkdown();
    const date = document.getElementById('meeting-date').value || 'feedback';
    download(`brochure-feedback-${date}.md`, md, 'text/markdown');
  }

  function downloadJSON() {
    const json = generateJSON();
    const date = document.getElementById('meeting-date').value || 'feedback';
    download(`brochure-feedback-${date}.json`, json, 'application/json');
  }

  function download(filename, content, mime) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([content], { type: mime }));
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
  }
</script>
</body>
</html>
